services:
  # Backend: FastAPI
  - type: web
    name: election-assistant-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: XAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://election-assistant.netlify.app" # Replace with your Netlify/Render frontend URL

  # Frontend: Static React Site (Optional: You can also use Netlify for this)
  - type: static
    name: election-assistant-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: "https://election-assistant-backend.onrender.com" # This will be your backend URL
